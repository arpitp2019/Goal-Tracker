name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend smoke test
        working-directory: frontend
        run: npm run smoke:pages

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Backend tests
        run: bash ./backend/mvnw -f backend/pom.xml test

      - name: Backend package
        run: bash ./backend/mvnw -f backend/pom.xml -DskipTests package

      - name: MindVault smoke test
        working-directory: frontend
        run: npm run smoke:mindvault

      - name: Publish required status check
        if: ${{ success() && github.event_name != 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'verify',
              description: 'All checks passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
