<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART Goal Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0d0d1a;
      --bg-card: #16213e;
      --bg-card2: #1a1a2e;
      --bg-header: rgba(13,13,26,0.92);
      --text-main: #f0f0ff;
      --text-muted: #8888aa;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent-hover: #6d28d9;
      --bar-bg: #2a2a4a;

      --color-progress: #10b981;
      --time-safe: #10b981;
      --time-warning: #f59e0b;
      --time-critical: #ef4444;

      --font-body: 'Nunito', sans-serif;
      --font-display: 'Fredoka One', cursive;

      --card-radius: 20px;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(124,58,237,0.15);
      --shadow-hover: 0 16px 48px rgba(0,0,0,0.5), 0 4px 16px rgba(124,58,237,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-main);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
      color: var(--text-main);
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* ═══════════════════ HEADER ═══════════════════ */
    header {
      background: var(--bg-header);
      backdrop-filter: blur(20px);
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid rgba(124,58,237,0.3);
      position: sticky; top: 0; z-index: 50;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      background: linear-gradient(135deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0;
    }
    h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; margin-bottom: 1rem; color: var(--text-main); }
    h3 { font-size: 1.05rem; font-weight: 700; }
    h4 { font-size: 0.95rem; font-weight: 800; }

    /* ═══════════════════ BUTTONS ═══════════════════ */
    .btn {
      background: linear-gradient(135deg, var(--accent), #9333ea);
      color: white; border: none;
      padding: 0.65rem 1.4rem; border-radius: 50px; cursor: pointer;
      font-family: var(--font-body); font-weight: 800; font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      letter-spacing: 0.3px;
    }
    .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 24px rgba(124,58,237,0.5); }
    .btn:active { transform: scale(0.96); }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(167,139,250,0.5);
      color: #c4b5fd;
      box-shadow: none;
    }
    .btn-outline:hover { background: rgba(124,58,237,0.15); border-color: #a78bfa; box-shadow: none; }

    .btn-small { padding: 0.3rem 0.85rem; font-size: 0.8rem; }

    .btn-green {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 15px rgba(16,185,129,0.4);
    }
    .btn-green:hover { box-shadow: 0 8px 24px rgba(16,185,129,0.5); }

    /* ═══════════════════ STATUS / HEADER RHS ═══════════════════ */
    .drive-status { display: flex; align-items: center; gap: 1rem; }
    .status-text { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; }

    /* ═══════════════════ CONTAINER ═══════════════════ */
    .container {
      padding: 2rem; max-width: 1280px; margin: 0 auto; width: 100%;
      flex: 1; display: flex; flex-direction: column; gap: 1.75rem;
    }

    /* ═══════════════════ STATS BAR ═══════════════════ */
    .stats-bar {
      display: flex; gap: 1rem; flex-wrap: wrap;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
      border: 2px solid rgba(124,58,237,0.25);
      border-radius: 16px; padding: 1rem 1.5rem;
      font-size: 0.9rem; font-weight: 700;
    }
    .stats-bar span { display: flex; align-items: center; gap: 0.4rem; }
    .stats-bar strong { color: #a78bfa; font-size: 1.1rem; }

    /* ═══════════════════ GOAL GRID ═══════════════════ */
    .goal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 1.5rem; }
    @media(max-width: 600px) { .goal-grid { grid-template-columns: 1fr; } }

    /* ═══════════════════ CARDS ═══════════════════ */
    .card {
      background: linear-gradient(145deg, #1e1e3f, #16213e);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      border: 2px solid rgba(124,58,237,0.2);
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: rgba(124,58,237,0.45); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .card-title { font-weight: 800; font-size: 1.15rem; line-height: 1.3; }
    .card-meta {
      font-size: 0.7rem; font-weight: 800; color: #a78bfa;
      background: rgba(124,58,237,0.2); padding: 0.25rem 0.6rem;
      border-radius: 50px; border: 1px solid rgba(124,58,237,0.3);
      white-space: nowrap; letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* ═══════════════════ DUAL BARS ═══════════════════ */
    .dual-bars {
      display: flex; flex-direction: column; gap: 0.75rem;
      background: rgba(0,0,0,0.25);
      padding: 1rem 1.1rem; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .bar-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .bar-label-row {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted);
    }
    .bar-track {
      width: 100%; height: 12px;
      background: var(--bar-bg);
      border-radius: 50px; overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }
    .bar-fill {
      height: 100%; border-radius: 50px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1), background-color 0.5s;
      position: relative; overflow: hidden;
    }
    .bar-fill::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 200%; height: 100%;
      background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.2) 50%, transparent 75%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }

    .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); }
    .time-fill { transition: width 1s linear, background-color 0.5s; }

    /* ═══════════════════ TASKS ═══════════════════ */
    .task-list { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 0.25rem; }
    .task-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: rgba(255,255,255,0.04);
      padding: 0.6rem 0.9rem; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s, border-color 0.15s;
    }
    .task-item:hover { background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.2); }
    .task-item input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer;
      accent-color: var(--accent); flex-shrink: 0;
    }
    .task-text { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .task-done .task-text { text-decoration: line-through; color: var(--text-muted); }

    /* ═══════════════════ SPRINT ═══════════════════ */
    .sprint-container {
      border-left: 3px solid var(--accent2);
      padding-left: 1rem; margin-top: 0.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      background: rgba(6,182,212,0.04);
      border-radius: 0 14px 14px 0;
      padding: 1rem 1rem 1rem 1.25rem;
    }

    /* ═══════════════════ MODALS ═══════════════════ */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .modal {
      background: linear-gradient(145deg, #1e1e3f, #16213e);
      padding: 2rem; border-radius: 24px;
      width: 100%; max-width: 480px;
      border: 2px solid rgba(124,58,237,0.4);
      box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,58,237,0.1);
      animation: modalPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { margin-bottom: 0; font-family: var(--font-display); font-size: 1.6rem; }
    .close-btn { background: rgba(255,255,255,0.08); border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; }
    .close-btn:hover { background: rgba(239,68,68,0.2); color: #f87171; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #c4b5fd; font-size: 0.85rem; font-weight: 800; letter-spacing: 0.3px; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.8rem 1rem;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(124,58,237,0.25);
      color: white; border-radius: 12px;
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }
    .form-group select option { background: #1e1e3f; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.75rem; }

    /* ═══════════════════ EMPTY STATE ═══════════════════ */
    .empty-state {
      text-align: center; padding: 4rem 2rem; color: var(--text-muted);
      background: linear-gradient(145deg, rgba(124,58,237,0.05), rgba(6,182,212,0.03));
      border-radius: var(--card-radius);
      border: 2px dashed rgba(124,58,237,0.25);
      grid-column: 1/-1;
    }
    .empty-state h3 { font-family: var(--font-display); font-size: 1.5rem; color: #a78bfa; margin-bottom: 0.5rem; }

    /* ═══════════════════ VAULT CARDS ═══════════════════ */
    .vault-card {
      border-color: rgba(16,185,129,0.35);
      background: linear-gradient(145deg, #0d2e1e, #16213e);
    }
    .vault-card::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .vault-stats {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-top: 0.5rem; font-size: 0.85rem; font-weight: 700;
      color: var(--text-muted);
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.15);
      padding: 0.6rem 0.9rem; border-radius: 12px;
    }

    /* ═══════════════════ EXPIRED BANNER ═══════════════════ */
    .expired-banner {
      background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(127,29,29,0.3));
      border: 2px solid rgba(239,68,68,0.5);
      border-radius: 12px; padding: 0.6rem 0.9rem;
      font-size: 0.82rem; font-weight: 800; color: #fca5a5;
      display: flex; align-items: center; gap: 0.5rem;
      animation: pulse-red 2s ease-in-out infinite;
    }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.2)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }

    /* ═══════════════════ WIN CONDITION ═══════════════════ */
    .success-criteria {
      font-size: 0.82rem; font-weight: 700;
      color: #bfdbfe;
      background: linear-gradient(135deg, rgba(6,182,212,0.12), rgba(124,58,237,0.1));
      border: 1px solid rgba(6,182,212,0.25);
      border-radius: 12px; padding: 0.5rem 0.9rem;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .success-criteria span { color: #22d3ee; font-weight: 900; white-space: nowrap; }

    /* ═══════════════════ COUNTDOWN ═══════════════════ */
    .countdown-display {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.6rem 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'Courier New', monospace;
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: 2px;
      color: #a78bfa;
    }
    .countdown-display.urgent {
      color: #ef4444;
      border-color: rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.08);
      animation: pulse-red 1.5s ease-in-out infinite;
    }
    .countdown-display.warning {
      color: #f59e0b;
      border-color: rgba(245,158,11,0.35);
      background: rgba(245,158,11,0.07);
    }
    .countdown-label { font-size: 0.65rem; letter-spacing: 0.5px; color: var(--text-muted); font-family: var(--font-body); font-weight: 800; text-transform: uppercase; margin-right: 0.25rem; }
  </style>
</head>
<body>

  <header>
    <h1>🎯 SMART Goal Tracker</h1>
    <div class="drive-status">
      <span class="status-text" id="sync-status">Local Save</span>
      <button id="btn-auth" class="btn btn-outline btn-small" onclick="handleAuthClick()">Connect Google Drive</button>
    </div>
  </header>

  <div class="container">
    <div style="display:flex; justify-content: space-between; align-items: center;">
      <div style="display:flex; gap: 1rem; align-items: center;">
        <h2 id="view-title">Active Dashboard</h2>
        <button id="btn-toggle-view" class="btn btn-outline btn-small" onclick="toggleView()">Open Confidence Vault 🏆</button>
      </div>
      <button class="btn" id="btn-new-goal" onclick="openGoalModal()">+ Create New Goal</button>
    </div>
    
    <div id="goals-container" class="goal-grid">
      <!-- Goals Render Here -->
    </div>
    <div id="vault-container" class="goal-grid" style="display:none;">
      <!-- Vault Render Here -->
    </div>
    <div id="stats-bar" class="stats-bar" style="display:none;">
      <!-- Stats Render Here -->
    </div>
  </div>

  <!-- New Goal Modal -->
  <div id="goal-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Establish New Goal</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
      </div>
      <div class="form-group">
        <label>Goal Definition (Specific)</label>
        <input type="text" id="g-title" placeholder="e.g. Complete Q3 Report">
      </div>
      <div class="form-group">
        <label>Success Criteria (Measurable) <span style="color:var(--text-muted); font-size:0.8rem">— How will you know you've succeeded?</span></label>
        <input type="text" id="g-criteria" placeholder="e.g. Report submitted and approved by manager">
      </div>
      <div class="form-group">
        <label>Time Horizon</label>
        <select id="g-type" onchange="toggleFormLogic()">
          <option value="short">Short Term (Days/Weeks) - Direct Tasks</option>
          <option value="long">Long Term (Months+) - Requires Sprints</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Deadline (Timebound)</label>
        <input type="datetime-local" id="g-deadline">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="saveGoal()">Initialize Goal</button>
      </div>
    </div>
  </div>

  <!-- Tasks Modal (for Short Term or Sprint) -->
  <div id="task-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Append Action Item</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
      </div>
      <input type="hidden" id="t-goal-id">
      <input type="hidden" id="t-sprint-id">
      <div class="form-group">
        <label>Task Description (Actionable)</label>
        <input type="text" id="t-text" placeholder="e.g. Gather data from analytics tool" onkeypress="if(event.key==='Enter') saveTask()">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="saveTask()" style="width: 100%">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Sprint Modal (for Long Term Goals) -->
  <div id="sprint-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Create Active Sprint</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
      </div>
      <input type="hidden" id="s-goal-id">
      <div class="form-group">
        <label>Sprint Focus</label>
        <input type="text" id="s-title" placeholder="e.g. Foundation Layer (Weeks 1-2)">
      </div>
      <div class="form-group">
        <label>Sprint Deadline</label>
        <input type="datetime-local" id="s-deadline">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="saveSprint()">Launch Sprint</button>
      </div>
    </div>
  </div>


  <script>
    // --- APP CONFIG ---
    const CLIENT_ID = '216540498622-2ccjhuedqhpkelaea8nv2suaicps07ov.apps.googleusercontent.com'; 
    const API_KEY = 'AIzaSyDD8NYtI5kgrTEfaqX3Uiq6ovUBiXp83Dc';
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

    let state = {
      goals: [], archivedGoals: [], isSynced: false
    };
    let currentView = 'active';
    let driveFileId = null;
    let tokenClient = null;
    let gapiInited = false;
    let autoSyncInt = null;
    let countdownIntervals = {}; // track per-goal countdown intervals

    // --- INIT ---
    function init() {
      const saved = localStorage.getItem('smart_ledger_state');
      // Detect old schema (from RPG version state) and nuke if necessary
      if (saved) { 
        let parsed = JSON.parse(saved);
        if(parsed.player) {
          console.log("Incompatible legacy save found. Purging.");
          localStorage.removeItem('smart_ledger_state');
        } else {
          if(!parsed.archivedGoals) parsed.archivedGoals = [];
          state = parsed; 
        }
      }
      render();
      // Lightweight bar refresh every 5 minutes — does NOT re-render DOM, just updates urgency bar widths
      setInterval(() => {
        document.querySelectorAll('[data-deadline]').forEach(el => {
          // bars update via setupCountdowns ticks; this is a fallback full re-render once per 5 min
        });
      }, 300000);
    }

    // --- GOOGLE DRIVE LOGIC ---
    function gapiLoaded() {
      console.log("GAPI Script Loaded");
      gapi.load('client', async () => {
        try {
          await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
          gapiInited = true;
          console.log("GAPI Initialized Successfully");
        } catch (e) { 
          console.error('GAPI Init error', e); 
          alert("Error: Google Drive API Key is invalid or blocked. Check console for details.");
        }
      });
    }

    function gisLoaded() {
      console.log("GIS Script Loaded");
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.error("Auth Error:", resp.error, resp.error_description);
            if (resp.error !== 'access_denied') {
              // Suppress UX alert for user-cancelled flows
              alert("Google Auth failed: " + resp.error_description);
            }
            return;
          }
          console.log("Auth Successful");
          state.isSynced = true;
          localStorage.setItem('smart_ledger_state', JSON.stringify(state));
          document.getElementById('sync-status').innerText = 'Connected...ing';
          await findOrCreateSaveFile();
        }
      });
      // Auto-reconnect if we were synced before
      if (state.isSynced) {
        console.log("Attempting auto-reconnect...");
        setTimeout(() => {
          tokenClient.requestAccessToken({prompt: 'none'});
        }, 1000);
      }
    }

    function handleAuthClick() {
      if (!gapiInited) {
        alert("Google Drive API is still initializing. Please wait 2-3 seconds.");
        return;
      }
      if (tokenClient === null) {
        alert("Google Login tool failed to load. Are you offline or using an ad-blocker?");
        return;
      }
      tokenClient.requestAccessToken({prompt: ''});
    }

    async function findOrCreateSaveFile() {
      if (!gapiInited) {
        console.warn("Retrying findOrCreateSaveFile in 500ms (GAPI not ready)");
        setTimeout(findOrCreateSaveFile, 500);
        return;
      }
      try {
        console.log("Searching for save file in AppData...");
        let res = await gapi.client.drive.files.list({
          spaces: 'appDataFolder', q: "name='smart_ledger_save.json'", fields: 'files(id)'
        });
        if (res.result.files && res.result.files.length > 0) {
          driveFileId = res.result.files[0].id;
          let fileRes = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
          if (fileRes.body) {
            let remoteState = JSON.parse(fileRes.body);
            if(!remoteState.player) { // Confirm not old data
              state = remoteState;
              saveLocal();
            }
          }
        } else {
          let metadata = { name: 'smart_ledger_save.json', parents: ['appDataFolder'] };
          let file = new Blob([JSON.stringify(state)], {type: 'application/json'});
          let formData = new FormData();
          formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
          formData.append('file', file);
          let fetchRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: new Headers({'Authorization': 'Bearer ' + gapi.client.getToken().access_token}),
            body: formData
          });
          let json = await fetchRes.json();
          driveFileId = json.id;
          console.log("New save file created:", driveFileId);
        }
        
        document.getElementById('sync-status').innerText = 'Synced ☁️';
        document.getElementById('sync-status').style.color = 'var(--text-main)';
        document.getElementById('btn-auth').style.display = 'none';
        render();

      } catch (e) { 
        console.error('Drive Load Error', e);
        if(e.status === 403) {
          alert("Access Denied: Please check if this URL is added to 'Authorized JavaScript Origins' in Google Cloud Console.");
        } else {
          alert("Connection Error: Check the browser console (F12) for details.");
        }
      }
    }

    async function syncToDrive() {
      const token = gapi.client.getToken();
      if (!gapiInited || !driveFileId || !token || !token.access_token) return;
      document.getElementById('sync-status').innerText = 'Syncing... ⌛';
      try {
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
          method: 'PATCH',
          headers: new Headers({
            'Authorization': 'Bearer ' + token.access_token,
            'Content-Type': 'application/json'
          }),
          body: JSON.stringify(state)
        });
        document.getElementById('sync-status').innerText = 'Synced ☁️';
      } catch(e) { document.getElementById('sync-status').innerText = 'Sync Error ⚠️'; }
    }

    function saveLocal() {
      localStorage.setItem('smart_ledger_state', JSON.stringify(state));
      render();
      if(driveFileId) {
        clearTimeout(autoSyncInt);
        autoSyncInt = setTimeout(syncToDrive, 2000); 
      }
    }

    // --- UTILS ---
    function generateId() { return Math.random().toString(36).substr(2, 9); }
    
    function calculateTimeRemainingInfo(createdAt, deadline) {
      if(!deadline) return { pctElapsed: 0, color: 'var(--bar-bg)', text: 'No Deadline' };
      let total = deadline - createdAt;
      if(total <= 0) total = 1; // Guard against division by zero
      let rawPassed = Date.now() - createdAt;
      let remaining = deadline - Date.now();
      
      // Determine the quantized "tick" step based on urgency
      let stepMs = 3600000; // <= 3 days: 1 hour tick
      if (remaining > 7 * 86400000) stepMs = 86400000; // > 7 days: 1 day tick
      else if (remaining > 3 * 86400000) stepMs = 43200000; // 3 to 7 days: 12 hour tick
      
      // Quantize "passed" time so the bar jumps in chunks
      let passed = Math.floor(rawPassed / stepMs) * stepMs;
      passed = Math.max(0, Math.min(passed, total));

      // pctElapsed: 0% = just started, 100% = deadline hit (bar FILLS as urgency grows)
      let rawPctElapsed = (passed / total) * 100;
      let pctElapsed = Math.max(0, Math.min(100, rawPctElapsed));
      
      // Color: green when fresh, yellow when getting close, red when critical
      let color = '#10b981'; // Green = safe
      if(pctElapsed >= 50) color = '#f59e0b'; // Yellow = caution
      if(pctElapsed >= 75) color = '#ef4444'; // Red = critical
      if(pctElapsed >= 100) color = '#7f1d1d'; // Dark red = expired

      let daysLeft = remaining / 86400000;
      let text = '';
      if(daysLeft < 0) text = '🔴 Expired!';
      else if(daysLeft < 1) text = '🔥 ' + Math.round(daysLeft * 24) + ' hrs left';
      else if(daysLeft <= 3) text = '⚠️ ' + Math.round(daysLeft) + ' days left';
      else text = Math.round(daysLeft) + ' days left';

      return { pctElapsed, color, text };
    }

    function calculateProgressInfo(tasks) {
      if(!tasks || tasks.length === 0) return { pct: 0, text: '0/0' };
      let done = tasks.filter(t => t.done).length;
      return { pct: (done / tasks.length) * 100, text: `${done}/${tasks.length}` };
    }

    function deleteGoal(gId) {
      if(confirm('Are you sure you want to delete this goal?')) {
        state.goals = state.goals.filter(g => g.id !== gId);
        saveLocal();
      }
    }

    // --- RENDER ---
    function render() {
      if (currentView === 'vault') {
        renderVault();
        return;
      }
      
      const gCont = document.getElementById('goals-container');
      
      if(state.goals.length === 0) {
        gCont.innerHTML = `<div class="empty-state"><h3>No active goals.</h3><p style="margin-top:0.5rem">Establish a new goal to begin your focus tracking.</p></div>`;
        return;
      }

      gCont.innerHTML = state.goals.map(g => {
        let isLong = g.type === 'long';
        let goalTime = calculateTimeRemainingInfo(g.createdAt, g.deadline);
        let isExpired = g.deadline && Date.now() > g.deadline;
        
        // Inner Content depending on Type
        let contentHtml = '';

        // Expired banner
        if(isExpired) {
          contentHtml += `<div class="expired-banner">⚠️ DEADLINE PASSED — Act now or reschedule this goal.</div>`;
        }

        // Success criteria chip
        if(g.success_criteria) {
          contentHtml += `<div class="success-criteria"><span>✓ Win Condition:</span> ${g.success_criteria}</div>`;
        }

        if(isLong) {
          // Long Term: Show macro urgency bar above sprints
          contentHtml += `
            <div class="dual-bars" style="background:transparent; border:none; padding:0; margin-bottom:1rem;">
              <div class="bar-group">
                <div class="bar-label-row"><span>Macro Urgency</span> <span>${goalTime.text}</span></div>
                <div class="bar-track"><div class="bar-fill" style="width: ${goalTime.pctElapsed}%; background-color: ${goalTime.color}; opacity: 0.6; border-radius: 50px; height: 100%;"></div></div>
              </div>
            </div>
          `;

          // Sort sprints: active first, then completed (newest first)
          let sortedSprints = [...g.sprints].sort((a,b) => {
             if(a.status === 'active') return -1;
             if(b.status === 'active') return 1;
             return (b.completedAt || 0) - (a.completedAt || 0);
          });

          // Render active sprint
          let activeSprint = sortedSprints.find(s => s.status === 'active');
          if(activeSprint) {
            let sProg = calculateProgressInfo(activeSprint.tasks);
            let sTime = calculateTimeRemainingInfo(activeSprint.createdAt, activeSprint.deadline);
            contentHtml += `
              <div class="sprint-container">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <h4>⚡ Active Sprint: ${activeSprint.title}</h4>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-small btn-outline" onclick="openTaskModal('${g.id}', '${activeSprint.id}')">+ Task</button>
                    <button class="btn btn-small btn-green" onclick="completeSprint('${g.id}', '${activeSprint.id}')">✓ Done</button>
                  </div>
                </div>
                
                <div class="dual-bars">
                  <div class="bar-group">
                    <div class="bar-label-row"><span style="color:#f59e0b">⏳ Urgency</span> <span>${sTime.text}</span></div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${sTime.pctElapsed}%; background-color: ${sTime.color}; border-radius: 50px; height: 100%;"></div></div>
                  </div>
                  <div class="bar-group">
                    <div class="bar-label-row"><span style="color:var(--accent)">Sprint Progress</span> <span>${sProg.text} Tasks</span></div>
                    <div class="bar-track"><div class="bar-fill progress-fill" style="width: ${sProg.pct}%;"></div></div>
                  </div>
                </div>

                <div class="task-list">
                  ${renderTasks(activeSprint.tasks, g.id, activeSprint.id)}
                </div>
              </div>
            `;
          } else {
            contentHtml += `<button class="btn btn-outline" style="width:100%; border-style: dashed; margin-bottom: 0.5rem;" onclick="openSprintModal('${g.id}')">+ Plan Next Sprint</button>`;
          }

          // Render completed sprints (History Stack)
          let completedSprints = sortedSprints.filter(s => s.status === 'complete');
          if(completedSprints.length > 0) {
            contentHtml += `<div style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase;">Sprint History</div>`;
            contentHtml += `<div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">`;
            
            contentHtml += completedSprints.map(s => {
               let tasksDone = s.tasks.filter(t=>t.done).length;
               let totalTasks = s.tasks.length;
               return `
                 <div style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-left: 3px solid var(--time-safe); padding: 0.75rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                   <div>
                     <div style="font-weight: 700; color: #a78bfa; font-size: 0.9rem;">${s.title}</div>
                     <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;">Completed on ${new Date(s.completedAt).toLocaleDateString()}</div>
                   </div>
                   <div style="font-size: 0.8rem; font-weight: 800; color: var(--time-safe); background: rgba(16, 185, 129, 0.1); padding: 0.2rem 0.6rem; border-radius: 50px;">
                     ${tasksDone}/${totalTasks} Tasks
                   </div>
                 </div>
               `;
            }).join('');
            contentHtml += `</div>`;
          }

        } else {
          // Short Term
          let prog = calculateProgressInfo(g.tasks);
          contentHtml += `
            <div class="dual-bars">
              <div class="bar-group">
                <div class="bar-label-row"><span style="color:#f59e0b">⏳ Urgency (fills → deadline)</span> <span>${goalTime.text}</span></div>
                <div class="bar-track"><div class="bar-fill" style="width: ${goalTime.pctElapsed}%; background-color: ${goalTime.color}; border-radius: 50px; height: 100%;"></div></div>
              </div>
              <div class="bar-group">
                <div class="bar-label-row"><span style="color:var(--accent)">Goal Progress</span> <span>${prog.text} Tasks</span></div>
                <div class="bar-track"><div class="bar-fill progress-fill" style="width: ${prog.pct}%;"></div></div>
              </div>
            </div>
            
            <div style="display:flex; justify-content:flex-end; margin-top: 0.5rem;"><button class="btn btn-small btn-outline" onclick="openTaskModal('${g.id}', null)">+ Task</button></div>
            <div class="task-list">
               ${renderTasks(g.tasks, g.id, null)}
            </div>
          `;
        }

        let typeLabel = isLong ? 'LONG TERM' : 'SHORT TERM';
        let cardBorder = isExpired ? 'border-color: #ef4444;' : '';

        return `
          <div class="card" id="g-${g.id}" style="${cardBorder}">
            <div class="card-header">
              <div class="card-title">${g.title}</div>
              <div style="display:flex; gap:0.5rem; align-items:center;">
                <span class="card-meta">${typeLabel}</span>
                <button title="Achieve Goal" style="background:none; border:none; color:var(--time-safari); cursor:pointer; font-size: 1.1rem" onclick="archiveGoal('${g.id}')">🏆</button>
                <button title="Delete Goal" style="background:none; border:none; color:var(--text-muted); cursor:pointer;" onclick="deleteGoal('${g.id}')">🗑️</button>
              </div>
            </div>
            ${g.deadline ? `<div class="countdown-display" id="countdown-${g.id}"><span class="countdown-label">⏱ Time Left</span> --:--:--</div>` : ''}
            ${contentHtml}
          </div>
        `;
      }).join('');

      // Update stats bar
      let vaultCount = state.archivedGoals ? state.archivedGoals.length : 0;
      let totalCrushed = state.archivedGoals ? state.archivedGoals.reduce((sum, g) => sum + (g.tasksCrushed || 0), 0) : 0;
      let statsBar = document.getElementById('stats-bar');
      statsBar.style.display = 'flex';
      statsBar.innerHTML = `
        <span>🎯 <strong>${state.goals.length}</strong> Active Goal${state.goals.length !== 1 ? 's' : ''}</span>
        <span>🏆 <strong>${vaultCount}</strong> Goals Conquered</span>
        <span>✅ <strong>${totalCrushed}</strong> Lifetime Tasks Crushed</span>
      `;

      // Setup live countdowns
      setupCountdowns();
    }

    // --- LIVE COUNTDOWNS ---

    function setupCountdowns() {
      // Clear all old intervals before setting new ones
      Object.values(countdownIntervals).forEach(id => clearInterval(id));
      countdownIntervals = {};

      state.goals.forEach(g => {
        if (!g.deadline) return;
        const el = document.getElementById(`countdown-${g.id}`);
        if (!el) return;

        function tick() {
          const remaining = g.deadline - Date.now();
          const daysLeft = remaining / 86400000;

          if (remaining <= 0) {
            el.className = 'countdown-display urgent';
            el.innerHTML = `<span class="countdown-label">⏱ Time Left</span> 🔴 EXPIRED`;
            clearInterval(countdownIntervals[g.id]);
            return;
          }

          const totalSecs = Math.floor(remaining / 1000);
          const days  = Math.floor(totalSecs / 86400);
          const hrs   = Math.floor((totalSecs % 86400) / 3600);
          const mins  = Math.floor((totalSecs % 3600) / 60);
          const secs  = totalSecs % 60;
          const pad   = n => String(n).padStart(2, '0');

          let timeStr = '';
          if (days > 0) timeStr = `${days}d ${pad(hrs)}h ${pad(mins)}m`;
          else          timeStr = `${pad(hrs)}:${pad(mins)}:${pad(secs)}`;

          // Urgency CSS class
          if      (daysLeft <  1) el.className = 'countdown-display urgent';
          else if (daysLeft <= 3) el.className = 'countdown-display urgent';
          else if (daysLeft <= 7) el.className = 'countdown-display warning';
          else                    el.className = 'countdown-display';

          el.innerHTML = `<span class="countdown-label">⏱ Time Left</span> ${timeStr}`;
        }

        tick(); // Run immediately on render

        // Refresh rate per user specification:
        const remaining = g.deadline - Date.now();
        const daysLeft  = remaining / 86400000;
        let intervalMs;
        if      (daysLeft <  1) intervalMs = 5  * 60 * 1000;    // < 1 day  → every 5 min
        else if (daysLeft <= 3) intervalMs = 30 * 60 * 1000;    // < 3 days → every 30 min
        else if (daysLeft <= 7) intervalMs = 60 * 60 * 1000;    // 3-7 days → every 1 hr
        else                    intervalMs = 4  * 60 * 60 * 1000;// > 7 days → every 4 hrs

        countdownIntervals[g.id] = setInterval(tick, intervalMs);
      });
    }

    function renderTasks(tasks, gId, sId) {
      if(!tasks || tasks.length === 0) return '';
      return tasks.map(t => `
        <div class="task-item ${t.done ? 'task-done' : ''}">
          <input type="checkbox" onchange="toggleTask('${gId}', '${sId}', '${t.id}')" ${t.done ? 'checked' : ''}>
          <span class="task-text">${t.text}</span>
          <button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size: 0.8rem;" onclick="deleteTask('${gId}', '${sId}', '${t.id}')">&times;</button>
        </div>
      `).join('');
    }

    // --- ACTIONS / MODALS ---
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    
    // Create Goal
    function openGoalModal() { 
      document.getElementById('g-title').value = '';
      document.getElementById('g-criteria').value = '';
      document.getElementById('goal-modal').style.display = 'flex'; 
    }
    
    function toggleFormLogic() { /* Reserved if we need to auto-hide deadline for long term, but usually smart to have it anyway */ }

    function saveGoal() {
      let title = document.getElementById('g-title').value;
      let type = document.getElementById('g-type').value;
      let deadVal = document.getElementById('g-deadline').value;
      let criteria = document.getElementById('g-criteria').value;
      if(!title) return;

      let goal = {
        id: generateId(), title, type, createdAt: Date.now(), status: 'active',
        deadline: deadVal ? new Date(deadVal).getTime() : null,
        success_criteria: criteria || null,
        sprints: [], tasks: []
      };

      state.goals.push(goal);
      closeModals();
      saveLocal();
    }

    // Create Sprint
    function openSprintModal(gId) {
      document.getElementById('s-title').value = '';
      document.getElementById('s-deadline').value = '';
      document.getElementById('s-goal-id').value = gId;
      document.getElementById('sprint-modal').style.display = 'flex';
    }

    function saveSprint() {
      let gId = document.getElementById('s-goal-id').value;
      let title = document.getElementById('s-title').value;
      let deadVal = document.getElementById('s-deadline').value;
      if(!title) return;

      let goal = state.goals.find(g => g.id === gId);
      if(goal) {
        goal.sprints.forEach(s => { if(s.status === 'active') s.status = 'archived'; }); // Archive running sprint
        goal.sprints.push({
          id: generateId(), title, createdAt: Date.now(), status: 'active',
          deadline: deadVal ? new Date(deadVal).getTime() : null,
          tasks: []
        });
      }
      closeModals();
      saveLocal();
    }

    // Tasks 
    function openTaskModal(gId, sId) {
      document.getElementById('t-text').value = '';
      document.getElementById('t-goal-id').value = gId || '';
      document.getElementById('t-sprint-id').value = sId || '';
      document.getElementById('task-modal').style.display = 'flex';
      setTimeout(()=>document.getElementById('t-text').focus(), 100);
    }

    function saveTask() {
      let gId = document.getElementById('t-goal-id').value;
      let sId = document.getElementById('t-sprint-id').value;
      let text = document.getElementById('t-text').value;
      if(!text) return;

      let goal = state.goals.find(g => g.id === gId);
      if(goal) {
        const isSprintTask = sId && sId !== 'null' && sId !== '';
        let taskContainer = isSprintTask ? goal.sprints.find(s => s.id === sId)?.tasks : goal.tasks;
        if (!taskContainer) { console.error('Task container not found', sId); return; }
        taskContainer.push({ id: generateId(), text, done: false });
      }

      document.getElementById('t-text').value = '';
      saveLocal();
      closeModals();
    }

    function toggleTask(gId, sId, tId) {
      let goal = state.goals.find(g => g.id === gId);
      let taskContainer = (sId && sId !== 'null') ? goal.sprints.find(s=>s.id===sId).tasks : goal.tasks;
      let t = taskContainer.find(x => x.id === tId);
      if(t) t.done = !t.done;
      saveLocal();
    }

    function deleteTask(gId, sId, tId) {
      let goal = state.goals.find(g => g.id === gId);
      if(sId && sId !== 'null') {
        let sprint = goal.sprints.find(s=>s.id===sId);
        sprint.tasks = sprint.tasks.filter(x => x.id !== tId);
      } else {
        goal.tasks = goal.tasks.filter(x => x.id !== tId);
      }
      saveLocal();
    }

    function completeSprint(gId, sId) {
      let goal = state.goals.find(g => g.id === gId);
      if(!goal) return;
      let sprint = goal.sprints.find(s => s.id === sId);
      if(!sprint) return;
      sprint.status = 'complete';
      sprint.completedAt = Date.now();
      saveLocal();
    }

    // Vault Logic
    function toggleView() {
      currentView = currentView === 'active' ? 'vault' : 'active';
      document.getElementById('view-title').innerText = currentView === 'active' ? 'Active Dashboard' : 'Confidence Vault';
      document.getElementById('btn-toggle-view').innerText = currentView === 'active' ? 'Open Confidence Vault 🏆' : 'Back to Dashboard 🔙';
      document.getElementById('btn-new-goal').style.display = currentView === 'active' ? 'block' : 'none';
      
      document.getElementById('goals-container').style.display = currentView === 'active' ? 'grid' : 'none';
      document.getElementById('vault-container').style.display = currentView === 'vault' ? 'grid' : 'none';
      render();
    }

    function archiveGoal(gId) {
      let g = state.goals.find(x => x.id === gId);
      if(!g) return;
      
      let tasksCrushed = 0;
      if(g.type === 'long') {
         g.sprints.forEach(s => tasksCrushed += s.tasks.filter(t=>t.done).length);
      } else {
         tasksCrushed = g.tasks.filter(t=>t.done).length;
      }
      
      // Clean up physics and set timestamp
      g.status = 'archived';
      g.completedAt = Date.now();
      g.tasksCrushed = tasksCrushed;

      state.archivedGoals.push(g);
      state.goals = state.goals.filter(x => x.id !== gId);
      saveLocal();
    }

    function renderVault() {
      const vCont = document.getElementById('vault-container');
      if(!state.archivedGoals || state.archivedGoals.length === 0) {
        vCont.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><h3>Vault is empty.</h3><p style="margin-top:0.5rem">Achieve a goal to start building your historical record of crushed tasks.</p></div>`;
        return;
      }
      
      // Sort newest first
      let sorted = [...state.archivedGoals].sort((a,b) => b.completedAt - a.completedAt);
      
      vCont.innerHTML = sorted.map(g => {
        let dateObj = new Date(g.completedAt);
        let dateStr = dateObj.toLocaleDateString() + ' at ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        return `
          <div class="card vault-card">
            <div class="card-header">
              <div class="card-title">${g.title}</div>
              <div style="display:flex; gap:0.5rem; align-items:center;">
                <span class="card-meta">Decimated on ${dateStr}</span>
                <button title="Delete Permanent" style="background:none; border:none; color:var(--text-muted); cursor:pointer;" onclick="deleteArchivedGoal('${g.id}')">🗑️</button>
              </div>
            </div>
            <div class="vault-stats">
              <span><strong>Tasks Crushed:</strong> ${g.tasksCrushed || 0}</span>
              <span><strong>Type:</strong> ${g.type === 'long' ? 'Long Term' : 'Short Term'}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function deleteArchivedGoal(gId) {
      if(confirm('Are you certain? This will permanently erase this achievement from your history.')) {
        state.archivedGoals = state.archivedGoals.filter(g => g.id !== gId);
        saveLocal();
      }
    }

    window.onload = init;
  </script>
