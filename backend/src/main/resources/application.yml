spring:
  application:
    name: flowdash
  datasource:
    url: ${FLOWDASH_DB_URL:jdbc:h2:mem:flowdash;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${FLOWDASH_DB_USERNAME:sa}
    password: ${FLOWDASH_DB_PASSWORD:sa}
    driver-class-name: ${FLOWDASH_DB_DRIVER:org.h2.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:flowdash-local-google-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:flowdash-local-google-secret}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

flowdash:
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:}
    local-fallback-enabled: true
  ai:
    provider: ${FLOWDASH_AI_PROVIDER:mock}
    model: ${FLOWDASH_AI_MODEL:flowdash-mock}
    base-url: ${FLOWDASH_AI_BASE_URL:}
    max-response-chars: ${FLOWDASH_AI_MAX_RESPONSE_CHARS:8000}

logging:
  level:
    org.springframework.security: INFO
    com.flowdash: INFO
